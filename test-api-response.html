<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Response</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #0a0a0a;
            color: #0f0;
        }
        h1 { color: #0f0; text-shadow: 0 0 10px #0f0; }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 5px;
            border-radius: 5px;
        }
        button:hover { background: #0c0; }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #1a1a1a;
            border: 2px solid #0f0;
            border-radius: 5px;
            white-space: pre-wrap;
            font-size: 12px;
            max-height: 600px;
            overflow-y: auto;
        }
        .error { border-color: #f00; color: #f00; }
        .success { border-color: #0f0; color: #0f0; }
        .warning { border-color: #ff0; color: #ff0; }
        .info { color: #0ff; }
        .highlight { background: #333; padding: 2px 5px; }
    </style>
</head>
<body>
    <h1>🔍 API Response Debugger</h1>
    <p class="info">This tool shows EXACTLY what the API is returning</p>
    
    <div>
        <button onclick="testAPI()">🧪 Test Question Generation</button>
        <button onclick="clearResult()">🗑️ Clear</button>
    </div>

    <div id="result"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://vertjjkacwtfjliwckrf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlcnRqamthY3d0ZmpsaXdja3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NjI3NjEsImV4cCI6MjA4NzQzODc2MX0.I_50vXtkmZALKxYUpFEvR5kAWyWaTOCSvIko95m6HXw';

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        window.testAPI = async function() {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result warning';
            resultDiv.innerHTML = '⏳ Calling API...\n\nConfiguration:\n- Subject: Mathematics\n- Level: Secondary School\n- Difficulty: Basic\n\nWaiting for response...';

            try {
                const startTime = Date.now();
                
                console.log('Calling generate-questions...');
                const { data, error } = await supabase.functions.invoke('generate-questions', {
                    body: {
                        qualification: 'Secondary School',
                        difficulty: 'Basic',
                        stream: 'Mathematics',
                        examType: 'mcq'
                    }
                });

                const duration = ((Date.now() - startTime) / 1000).toFixed(2);
                console.log('Response received:', data);

                if (error) {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `❌ API ERROR (${duration}s)\n\n${JSON.stringify(error, null, 2)}`;
                    return;
                }

                if (data.error) {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `❌ FUNCTION ERROR (${duration}s)\n\n${data.error}`;
                    return;
                }

                // Analyze the response
                let analysis = `✅ API CALL SUCCESSFUL (${duration}s)\n\n`;
                analysis += `═══════════════════════════════════════\n`;
                analysis += `RESPONSE ANALYSIS:\n`;
                analysis += `═══════════════════════════════════════\n\n`;

                if (data.questions && Array.isArray(data.questions)) {
                    analysis += `✅ Questions array found: ${data.questions.length} questions\n\n`;

                    // Check first question
                    const q1 = data.questions[0];
                    if (q1) {
                        analysis += `FIRST QUESTION ANALYSIS:\n`;
                        analysis += `─────────────────────────\n`;
                        analysis += `ID: ${q1.id || 'MISSING'}\n`;
                        analysis += `Type: ${q1.type || 'MISSING'}\n`;
                        analysis += `Format: ${q1.format || 'MISSING'}\n`;
                        analysis += `Has Scenario: ${q1.scenario ? '✅ YES' : '❌ NO'}\n`;
                        analysis += `Has Question: ${q1.question ? '✅ YES' : '❌ NO'}\n`;
                        analysis += `Has Options: ${q1.options ? '✅ YES' : '❌ NO'}\n`;
                        
                        if (q1.options) {
                            analysis += `Options Count: ${q1.options.length}\n`;
                            analysis += `Options Type: ${typeof q1.options}\n`;
                            if (Array.isArray(q1.options)) {
                                analysis += `Options:\n`;
                                q1.options.forEach((opt, i) => {
                                    analysis += `  ${i + 1}. ${opt}\n`;
                                });
                            }
                        } else {
                            analysis += `⚠️ OPTIONS MISSING! This is why you see "Question format error"\n`;
                        }
                        
                        analysis += `Has Correct Answer: ${q1.correctAnswer ? '✅ YES' : '❌ NO'}\n`;
                        analysis += `Time Limit: ${q1.timeLimit || 'MISSING'}\n`;
                        analysis += `Max Points: ${q1.maxPoints || 'MISSING'}\n\n`;

                        // Check if it's subject-specific
                        const questionText = (q1.scenario || '') + ' ' + (q1.question || '');
                        const hasMathKeywords = /math|number|calculate|equation|solve|algebra|geometry|arithmetic|fraction|decimal|percentage|area|volume|perimeter/i.test(questionText);
                        
                        analysis += `Subject Check:\n`;
                        analysis += `─────────────────────────\n`;
                        analysis += `Contains Math Keywords: ${hasMathKeywords ? '✅ YES' : '❌ NO'}\n`;
                        if (!hasMathKeywords) {
                            analysis += `⚠️ Question doesn't seem to be about Mathematics!\n`;
                        }
                        analysis += `\n`;

                        analysis += `FULL QUESTION DATA:\n`;
                        analysis += `─────────────────────────\n`;
                        analysis += JSON.stringify(q1, null, 2);
                    }
                } else {
                    analysis += `❌ NO QUESTIONS ARRAY FOUND!\n\n`;
                }

                analysis += `\n\n═══════════════════════════════════════\n`;
                analysis += `FULL API RESPONSE:\n`;
                analysis += `═══════════════════════════════════════\n\n`;
                analysis += JSON.stringify(data, null, 2);

                resultDiv.className = 'result success';
                resultDiv.innerHTML = analysis;

            } catch (err) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ EXCEPTION\n\n${err.message}\n\n${err.stack}`;
                console.error('Error:', err);
            }
        };

        window.clearResult = function() {
            document.getElementById('result').innerHTML = '';
        };
    </script>
</body>
</html>
